name: MLB Model — Daily Run

on:
  schedule:
    # 8pm Sydney AEST = 10:00 UTC (UTC+10, Apr–Oct)
    # 8pm Sydney AEDT = 09:00 UTC (UTC+11, Oct–Apr)
    # 10:00 UTC covers both — games starting, pitchers confirmed
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-mlb-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy requests pybaseball beautifulsoup4 openpyxl

      - name: Run MLB Model
        env:
          GITHUB_TOKEN: ${{ secrets.MLB_GITHUB_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python "MLB 0606 Odds with Pitcher data.py"

      - name: Confirm Gist push
        run: echo "✅ MLB model run complete — Gist updated"
